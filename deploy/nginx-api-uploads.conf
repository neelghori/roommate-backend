# Snippet for api.roommat.in (or your API reverse proxy).
# 413 Request Entity Too Large happens when this limit is below your upload size.
#
# Gallery: up to 10 images × 5 MB each if sent in one request (~50 MB+).
# Recommended: keep website uploads one file per request; still set 64m for safety.
#
# Include inside the server { } block for https://api.roommat.in :

client_max_body_size 64m;

